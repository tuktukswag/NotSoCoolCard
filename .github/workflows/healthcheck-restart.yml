name: Healthcheck and Auto-Restart Flask

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    env:
      SITE_URL: https://notsocoolcard.qzz.io/
      APP_SERVICE: notsocoolcard
      WEB_SERVICE: nginx
    steps:
      - name: Check website health
        id: health
        run: |
          set +e
          RESPONSE=$(curl -sS -L -o /dev/null -w "%{http_code}" "$SITE_URL" --connect-timeout 5 --max-time 15)
          CURL_EXIT=$?
          set -e

          echo "response_code=$RESPONSE" >> $GITHUB_OUTPUT
          echo "curl_exit=$CURL_EXIT" >> $GITHUB_OUTPUT

          if [ "$CURL_EXIT" -ne 0 ] || [ "$RESPONSE" != "200" ]; then
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "Website unhealthy (curl_exit=$CURL_EXIT, status=$RESPONSE) - triggering restart"
          else
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "Website healthy (status=$RESPONSE)"
          fi

      - name: Capture public response diagnostics
        if: steps.health.outputs.healthy == 'false'
        run: |
          echo "=== Public headers ==="
          curl -sS -L -D - -o /dev/null "$SITE_URL" --connect-timeout 5 --max-time 15 || true
          echo
          echo "=== Public body sample (first 120 lines) ==="
          curl -sS -L "$SITE_URL" --connect-timeout 5 --max-time 15 | sed -n '1,120p' || true

      - name: Collect VM diagnostics via SSH
        if: steps.health.outputs.healthy == 'false'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set +e
            SUDO="sudo -n"
            echo "=== VM baseline ==="
            date
            uptime
            whoami
            echo
            echo "=== Service status ==="
            $SUDO systemctl is-active ${{ env.APP_SERVICE }} || echo "Cannot read app service status without passwordless sudo"
            $SUDO systemctl status ${{ env.APP_SERVICE }} --no-pager -l | tail -n 80 || true
            $SUDO systemctl is-active ${{ env.WEB_SERVICE }} || echo "Cannot read web service status without passwordless sudo"
            $SUDO systemctl status ${{ env.WEB_SERVICE }} --no-pager -l | tail -n 80 || true
            echo
            echo "=== Recent logs ==="
            $SUDO journalctl -u ${{ env.APP_SERVICE }} -n 120 --no-pager || true
            $SUDO journalctl -u ${{ env.WEB_SERVICE }} -n 120 --no-pager || true
            echo
            echo "=== Ports / resources ==="
            $SUDO ss -lntp | grep -E ':80 |:443 |:5000 ' || ss -lnt | grep -E ':80 |:443 |:5000 ' || true
            df -h || true
            free -m || true

      - name: Restart Flask on VM via SSH
        if: steps.health.outputs.healthy == 'false' || github.event_name == 'workflow_dispatch'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            set -e
            SUDO="sudo -n"
            if ! $SUDO -v >/dev/null 2>&1; then
              echo "Passwordless sudo is required for automated restart. Configure sudoers for $USER."
              echo "Example: $USER ALL=(root) NOPASSWD:/bin/systemctl restart ${{ env.APP_SERVICE }},/bin/systemctl restart ${{ env.WEB_SERVICE }},/bin/systemctl status ${{ env.APP_SERVICE }},/bin/systemctl status ${{ env.WEB_SERVICE }}"
              exit 1
            fi
            echo "Restarting app service: ${{ env.APP_SERVICE }}"
            $SUDO systemctl restart ${{ env.APP_SERVICE }}
            echo "Restarting web service: ${{ env.WEB_SERVICE }}"
            $SUDO systemctl restart ${{ env.WEB_SERVICE }}
            sleep 5
            echo "Post-restart service state"
            $SUDO systemctl --no-pager --full status ${{ env.APP_SERVICE }} | tail -n 60
            $SUDO systemctl --no-pager --full status ${{ env.WEB_SERVICE }} | tail -n 60
            curl -sS http://127.0.0.1:5000/ -o /dev/null && echo "Local app endpoint reachable" || echo "Local app endpoint check failed"

      - name: Verify website health after restart/check
        run: |
          ATTEMPTS=3
          DELAY=10
          for i in $(seq 1 $ATTEMPTS); do
            set +e
            RESPONSE=$(curl -sS -L -o /dev/null -w "%{http_code}" "$SITE_URL" --connect-timeout 5 --max-time 15)
            CURL_EXIT=$?
            set -e

            echo "Post-check attempt $i/$ATTEMPTS: status=$RESPONSE, curl_exit=$CURL_EXIT"
            if [ "$CURL_EXIT" -eq 0 ] && [ "$RESPONSE" = "200" ]; then
              echo "Website healthy"
              exit 0
            fi

            if [ "$i" -lt "$ATTEMPTS" ]; then
              echo "Still unhealthy, waiting ${DELAY}s before retry..."
              sleep "$DELAY"
            fi
          done

          echo "Website is still down after restart/check retries"
          exit 1
