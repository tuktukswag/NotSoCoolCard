<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Commander Challenge Card Search</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Commander Challenge Card Search</h1>
      <p class="muted">
        Search cards from your generated JSON file.
        {% if meta.query %}<span>Source query: <code>{{ meta.query }}</code></span>{% endif %}
        {% if meta.prices_updated_at %}<span> • Prices updated: <code>{{ meta.prices_updated_at }}</code></span>{% endif %}
      </p>
    </div>
    <div class="summary" id="summary">Loading…</div>
  </header>

  <section class="filters">
    <div class="filter-grid">
      <label>Name<input id="nameFilter" type="text" placeholder="Storm Herd"></label>

      <label>Exact card color
        <select id="colorFilter">
          <option value="">Any</option>
          <option>W</option><option>U</option><option>B</option><option>R</option><option>G</option>
          <option>WU</option><option>WB</option><option>WR</option><option>WG</option>
          <option>UB</option><option>UR</option><option>UG</option><option>BR</option><option>BG</option><option>RG</option>
          <option>WUB</option><option>WUR</option><option>WUG</option><option>WBR</option><option>WBG</option><option>WRG</option>
          <option>UBR</option><option>UBG</option><option>URG</option><option>BRG</option>
          <option>WUBR</option><option>WUBG</option><option>WURG</option><option>WBRG</option><option>UBRG</option>
          <option>WUBRG</option><option>COLORLESS</option>
        </select>
      </label>

      <fieldset class="commander-fieldset">
        <legend>Commander color identity</legend>
        <div class="color-checks">
          <label class="mini-check"><input id="commanderW" type="checkbox"> W</label>
          <label class="mini-check"><input id="commanderU" type="checkbox"> U</label>
          <label class="mini-check"><input id="commanderB" type="checkbox"> B</label>
          <label class="mini-check"><input id="commanderR" type="checkbox"> R</label>
          <label class="mini-check"><input id="commanderG" type="checkbox"> G</label>
        </div>
        <label class="checkbox-label inline-check"><input id="limitToCommanderIdentity" type="checkbox"> Limit cards to this commander identity</label>
      </fieldset>

      <label>Max Include %<input id="includeFilter" type="number" step="0.01" min="0" placeholder="2.00"></label>
      <label>Max USD price<input id="priceFilter" type="number" step="0.01" min="0" placeholder="5.00"></label>
      <label>Tag contains<input id="tagFilter" type="text" placeholder="lifegain matters"></label>
      <label>Type contains<input id="typeFilter" type="text" placeholder="Creature"></label>
      <label>Max mana value<input id="cmcFilter" type="number" step="0.5" min="0" placeholder="4"></label>

      <label>Sort by
        <select id="sortFilter">
          <option value="include_desc">Include %: highest first</option>
          <option value="include_asc">Include %: lowest first</option>
          <option value="price_asc">Price: low to high</option>
          <option value="price_desc">Price: high to low</option>
          <option value="name_asc">Name: A-Z</option>
          <option value="cmc_asc">Mana value: low to high</option>
          <option value="edhrec_rank_asc">EDHREC rank: low to high</option>
        </select>
      </label>

      <label class="checkbox-label"><input id="imageToggle" type="checkbox" checked> Show images</label>
    </div>
  </section>

  <section class="pagination-wrap">
    <div class="page-summary" id="pageSummary">Page 1</div>
    <div class="page-controls">
      <button id="prevPageBtn" type="button">Previous</button>
      <button id="nextPageBtn" type="button">Next</button>
    </div>
  </section>

  <section class="results-wrap"><div id="results" class="results"></div></section>

  <section class="pagination-wrap bottom-pagination">
    <div class="page-summary" id="pageSummaryBottom">Page 1</div>
    <div class="page-controls">
      <button id="prevPageBtnBottom" type="button">Previous</button>
      <button id="nextPageBtnBottom" type="button">Next</button>
    </div>
  </section>

  <template id="cardTemplate">
    <article class="card-row">
      <div class="image-wrap"><img class="card-image" alt=""></div>
      <div class="card-content">
        <div class="title-row">
          <h2 class="card-name"></h2>
          <div class="pill-row">
            <span class="pill color-pill"></span>
            <span class="pill include-pill"></span>
            <span class="pill cmc-pill"></span>
            <span class="pill commander-pill"></span>
            <span class="pill price-pill"></span>
          </div>
        </div>
        <div class="meta-row"></div>
        <div class="mana-row"></div>
        <div class="price-row"></div>
        <div class="tags-row"></div>
        <div class="link-row">
          <a class="edhrec-link" target="_blank" rel="noopener noreferrer">EDHREC</a>
          <a class="scryfall-link" target="_blank" rel="noopener noreferrer">Scryfall</a>
          <a class="image-link" target="_blank" rel="noopener noreferrer">Image</a>
        </div>
      </div>
    </article>
  </template>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
