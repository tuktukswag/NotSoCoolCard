<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Commander Challenge Card Search</title><link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"></head><body><header class="topbar"><div><h1>Commander Challenge Card Search</h1></div><div class="summary" id="summary">Loading&hellip;</div><div class="topbar-actions"><label class="checkbox-label"><input id="imageToggle" type="checkbox" checked> Show images</label><label class="checkbox-label"><input id="showTagsToggle" type="checkbox"> Show tags</label><div class="search-actions"><button id="searchFiltersBtn" type="button">Search</button><button id="resetFiltersBtn" type="button">Reset</button></div></div></header><nav class="tab-nav"><button id="searchTabBtn" class="tab-btn active" type="button">Search</button><button id="deckCheckTabBtn" class="tab-btn" type="button">Deck Check</button></nav><main><section id="searchTab" class="tab-panel active"><section class="filters"><div class="filter-layout"><div class="filter-colors"><fieldset class="exact-color-fieldset"><legend>Exact card color</legend><div class="color-choices"><label class="color-option"><input name="exactColor" type="checkbox" value="W"><span class="pip pip-symbol" data-symbol="{W}"></span></label><label class="color-option"><input name="exactColor" type="checkbox" value="U"><span class="pip pip-symbol" data-symbol="{U}"></span></label><label class="color-option"><input name="exactColor" type="checkbox" value="B"><span class="pip pip-symbol" data-symbol="{B}"></span></label><label class="color-option"><input name="exactColor" type="checkbox" value="R"><span class="pip pip-symbol" data-symbol="{R}"></span></label><label class="color-option"><input name="exactColor" type="checkbox" value="G"><span class="pip pip-symbol" data-symbol="{G}"></span></label><label class="color-option"><input name="exactColor" type="checkbox" value="COLORLESS"><span class="pip pip-symbol" data-symbol="{C}"></span></label></div></fieldset><fieldset class="commander-fieldset"><legend>Commander color identity</legend><div class="color-choices"><label class="color-option"><input id="commanderW" type="checkbox" value="W"><span class="pip pip-symbol" data-symbol="{W}"></span></label><label class="color-option"><input id="commanderU" type="checkbox" value="U"><span class="pip pip-symbol" data-symbol="{U}"></span></label><label class="color-option"><input id="commanderB" type="checkbox" value="B"><span class="pip pip-symbol" data-symbol="{B}"></span></label><label class="color-option"><input id="commanderR" type="checkbox" value="R"><span class="pip pip-symbol" data-symbol="{R}"></span></label><label class="color-option"><input id="commanderG" type="checkbox" value="G"><span class="pip pip-symbol" data-symbol="{G}"></span></label><label class="color-option"><input id="commanderC" type="checkbox" value="C"><span class="pip pip-symbol" data-symbol="{C}"></span></label></div></fieldset></div><div class="filter-grid"><label><span class="label-title">Name <span class="info-dot" title="Partial match. Case-insensitive.">i</span></span><input id="nameFilter" type="text" placeholder="Storm Herd"></label><label><span class="label-title">Set <span class="info-dot" title="Filter by set code shortname, like neo or mh3. Use | for OR and , for AND groups.">i</span></span><input id="setFilter" type="text" placeholder="neo|mh3"></label><label><span class="label-title">Max Include % <span class="info-dot" title="Shows cards with Include % less than or equal to this value.">i</span></span><input id="includeFilter" type="number" step="0.01" min="0" placeholder="2.00"></label><label><span class="label-title">Max SEK price <span class="info-dot" title="Shows cards with SEK price less than or equal to this value.">i</span></span><input id="priceFilter" type="number" step="0.01" min="0" placeholder="50.00"></label><label><span class="label-title">Type include <span class="info-dot" title="Use | for OR and , for AND groups. Example: instant|sorcery, creature.">i</span></span><input id="typeIncludeFilter" type="text" placeholder="instant|sorcery, creature"></label><label><span class="label-title">Type exclude <span class="info-dot" title="Exclude if any term matches. Use | for OR and , for AND groups.">i</span></span><input id="typeExcludeFilter" type="text" placeholder="enchantment|aura"></label><label><span class="label-title">Tag contains <span class="info-dot" title="Use otag:term. Use | for OR and , for AND groups. Put &quot;term&quot; in quotes for whole-word or exact-phrase match.">i</span></span><input id="tagFilter" type="text" placeholder="otag:lifegain|otag:tokens"></label><label><span class="label-title">Text contains <span class="info-dot" title="Oracle text match. Use | for OR and , for AND groups.">i</span></span><input id="textFilter" type="text" placeholder="draw a card|create a token"></label><label><span class="label-title">Mana value <span class="info-dot" title="Filter by mana value range. Leave either blank for no bound.">i</span></span><div class="inline-pair"><input id="cmcMinFilter" type="number" step="0.5" min="0" placeholder="Min"><input id="cmcMaxFilter" type="number" step="0.5" min="0" placeholder="Max"></div></label><label><span class="label-title">Sort by <span class="info-dot" title="Sorts current filtered results only.">i</span></span><select id="sortFilter"><option value="include_desc">Include %: highest first</option><option value="include_asc">Include %: lowest first</option><option value="price_asc">SEK: low to high</option><option value="price_desc">SEK: high to low</option><option value="name_asc">Name: A-Z</option><option value="cmc_asc">Mana value: low to high</option><option value="edhrec_rank_asc">EDHREC rank: low to high</option></select></label></div></div></section><section class="pagination-wrap"><div class="page-summary" id="pageSummary">Page 1</div><div class="page-controls"><button id="prevPageBtn" type="button">Previous</button><button id="nextPageBtn" type="button">Next</button></div></section><section class="results-wrap"><div id="results" class="results"></div></section><section class="pagination-wrap bottom-pagination"><div class="page-summary" id="pageSummaryBottom">Page 1</div><div class="page-controls"><button id="prevPageBtnBottom" type="button">Previous</button><button id="nextPageBtnBottom" type="button">Next</button></div></section></section><section id="deckCheckTab" class="tab-panel"><section class="filters"><div class="deck-grid"><label>Deck URL (Moxfield / Archidekt / ManaBox)<input id="deckUrlInput" type="text" placeholder="Paste a public deck URL"></label><div class="deck-url-actions"><button id="fetchDeckBtn" type="button">Fetch decklist</button></div><label class="full-width">Decklist<textarea id="decklistInput" rows="16" placeholder="1 Sol Ring&#10;1 Arcane Signet&#10;1 Storm Herd"></textarea></label><div class="deck-controls"><label>Check using<select id="deckThresholdMode"><option value="include">Max Include %</option><option value="price">Max SEK price</option></select></label><label id="deckThresholdLabel"><span>Max Include %</span><input id="deckThresholdFilter" type="number" step="0.01" min="0" value="2"></label><label class="checkbox-label compact"><input id="excludeLandsCheckbox" type="checkbox" checked> Exclude lands</label><button id="checkDeckBtn" type="button">Check deck</button></div><div id="deckInfoBox" class="info-box">Paste a decklist or fetch one from a supported public URL.</div></div></section><section class="deck-results-wrap"><div id="deckResults"></div></section></section></main><template id="cardTemplate"><article class="card-row"><div class="image-wrap"><img class="card-image" alt=""></div><div class="card-content"><h2 class="card-name"></h2><div class="pill-row"><span class="pill color-pill"></span><span class="pill commander-pill"></span><span class="pill include-pill"></span><span class="pill price-pill"></span><span class="pill cmc-pill"></span><button class="pill flip-pill" type="button" title="Flip card" aria-label="Flip card">&#x21BB;</button></div><div class="meta-row"></div><div class="mana-row"></div><div class="tags-row"></div><div class="link-row"><a class="edhrec-link" target="_blank" rel="noopener noreferrer">EDHREC</a><a class="scryfall-link" target="_blank" rel="noopener noreferrer">Scryfall</a><a class="image-link" target="_blank" rel="noopener noreferrer">Image</a></div></div></article></template><script src="{{ url_for('static', filename='app.js') }}"></script></body></html>
